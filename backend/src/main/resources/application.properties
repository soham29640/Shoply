# ===== SERVER =====
server.port=8080

# ===== DATABASE (MySQL) =====
spring.datasource.url=jdbc:mysql://localhost:3306/amazon_clone?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===== JWT =====
app.jwt.secret=AmazonCloneSecretKey2024VeryLongSecretKeyForJWTTokenSigningWithHS256Algorithm
app.jwt.expiration=86400000

# ===== LOGGING =====
logging.level.com.amazon=DEBUG
logging.level.org.springframework.security=DEBUG
